<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { vplDark: '#0B0C10', vplCard: '#1F2833', vplGold: '#F2A900', vplCyan: '#66FCF1' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0C10; color: white; overflow-x: hidden; font-family: 'Montserrat', sans-serif;}
        .glass { background: rgba(31, 40, 51, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(102, 252, 241, 0.2); }
        
        /* Ticking UI Styles */
        .role-radio:checked + label { 
            background-color: #F2A900; 
            color: #0B0C10; 
            border-color: #F2A900; 
            transform: scale(1.03); 
            box-shadow: 0 4px 20px rgba(242, 169, 0, 0.3);
        }
        .role-radio + label .tick-icon { display: none; }
        .role-radio + label .empty-icon { display: inline-block; opacity: 0.4; }
        .role-radio:checked + label .empty-icon { display: none; }
        .role-radio:checked + label .tick-icon { 
            display: inline-block; 
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Sprite Sheet Animation & 3D Faking Tricks */
        .sprite-character {
            width: 100%;
            height: 100%;
            background: url('cartoon.jpg') no-repeat;
            background-size: 400% 300%; 
            animation: typingLoop 0.6s step-end infinite;
            transform: perspective(400px) rotateY(-25deg) scale(1.1);
            transform-origin: center center;
            mix-blend-mode: screen; 
        }

        @keyframes typingLoop {
            0% { background-position: 0% 0%; }
            25% { background-position: 33.333% 0%; }
            50% { background-position: 66.666% 0%; }
            75% { background-position: 100% 0%; }
            100% { background-position: 100% 0%; }
        }

        .hide { display: none !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0B0C10; }
        ::-webkit-scrollbar-thumb { background: #1F2833; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #66FCF1; }
    </style>
</head>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrIZGFRB-oQh-jdNAR_15CKCL9W4SsER4",
            authDomain: "gen-lang-client-0944072808.firebaseapp.com",
            projectId: "gen-lang-client-0944072808",
            firestoreDatabaseId: "ai-studio-ad0898ab-627f-4755-b861-1ecaad7c3888",
            appId: "1:342157735096:web:12fa54957835aeefca704d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);

        let globalPlayers = []; 
        let isAdmin = localStorage.getItem('vpl_admin') === 'true';
        let compressedDataUrl = null;

        if(isAdmin) document.getElementById('adminPanelBar').classList.remove('hide');

        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.classList.add('hide');
                    document.getElementById('mainBody').classList.remove('overflow-hidden');
                }, 700);
            }, 3000); 
        });

        window.compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600, MAX_HEIGHT = 800;
                        let { width, height } = img;
                        if (width > height && width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } 
                        else if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#0B0C10'; ctx.fillRect(0, 0, width, height);
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        window.previewImage = async (e) => {
            const file = e.target.files[0];
            if(file && file.type.startsWith('image/')) {
                document.getElementById('uploadPlaceholder').classList.add('hide');
                const pImg = document.getElementById('previewImg');
                pImg.src = URL.createObjectURL(file);
                pImg.classList.remove('hide');
                compressedDataUrl = await window.compressImage(file);
            } else {
                alert("Please select a valid image.");
            }
        };

        window.submitRegistration = async () => {
            if(!compressedDataUrl) return alert("Upload a photo.");
            const btnText = document.getElementById('btnText'), btnLoader = document.getElementById('btnLoader');
            btnText.classList.add('hide'); btnLoader.classList.remove('hide');

            const name = document.getElementById('playerName').value;
            const phone = document.getElementById('playerPhone').value;
            const role = document.querySelector('input[name="role"]:checked').value;

            try {
                await addDoc(collection(db, "players"), {
                    name, phone, role, photoData: compressedDataUrl, timestamp: serverTimestamp()
                });
                document.getElementById('regForm').reset();
                document.getElementById('previewImg').classList.add('hide');
                document.getElementById('uploadPlaceholder').classList.remove('hide');
                compressedDataUrl = null;
                window.setView('thanks');
            } catch(e) {
                console.error(e); alert("Registration failed.");
            } finally {
                btnText.classList.remove('hide'); btnLoader.classList.add('hide');
            }
        };

        window.setView = (v) => {
            ['registerView', 'thanksView', 'listView'].forEach(id => document.getElementById(id).classList.add('hide'));
            document.getElementById(v+'View').classList.remove('hide');
            if(v === 'list') window.fetchPlayers();
        };

        window.fetchPlayers = async () => {
            const grid = document.getElementById('playerGrid');
            grid.innerHTML = '<div class="col-span-full py-20 text-center text-vplCyan flex flex-col items-center"><i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i></div>';
            try {
                const q = query(collection(db, "players"), orderBy("timestamp", "desc"));
                const snap = await getDocs(q);
                globalPlayers = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                
                if(snap.empty) { grid.innerHTML = '<div class="col-span-full text-center text-white/40 py-20 font-bold tracking-widest uppercase text-sm">No players registered.</div>'; return; }

                grid.innerHTML = globalPlayers.map(p => {
                    let roleIcon = p.role === 'Batsman' ? 'fa-baseball-bat-ball text-vplCyan' : p.role === 'Bowler' ? 'fa-crosshairs text-red-400' : 'fa-star text-vplGold';
                    return `
                    <div class="glass rounded-2xl overflow-hidden group border border-white/5 flex flex-col shadow-lg bg-black/60 relative">
                        ${isAdmin ? `<button onclick="deletePlayer('${p.id}')" class="absolute top-3 right-3 p-2 bg-red-500/90 text-white rounded-full z-10"><i class="fa-solid fa-trash text-xs"></i></button>`:''}
                        <div class="aspect-[4/5] bg-black/80 flex items-center justify-center p-3 overflow-hidden border-b border-white/5 relative">
                            <img src="${p.photoData}" class="max-w-full max-h-full object-cover relative z-10 drop-shadow-2xl rounded-xl">
                        </div>
                        <div class="p-4 sm:p-5 flex-grow flex flex-col">
                            <h3 class="text-lg sm:text-xl font-black uppercase text-white truncate">${p.name}</h3>
                            <div class="mt-1 sm:mt-2 flex items-center gap-2"><i class="fa-solid ${roleIcon}"></i> <span class="text-[9px] sm:text-[10px] font-bold text-white/70 uppercase tracking-widest">${p.role}</span></div>
                            <button onclick="exportSingleCard('${p.id}')" class="mt-4 sm:mt-6 w-full border border-vplCyan/70 text-vplCyan py-3 rounded-xl font-black text-[9px] sm:text-[10px] tracking-widest hover:bg-vplCyan hover:text-vplDark transition-all"><i class="fa-solid fa-download mr-1"></i> GENERATE HD CARD</button>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) { console.error(e); }
        };

        window.deletePlayer = async (id) => {
            if(!confirm("Delete this player?")) return;
            await deleteDoc(doc(db, "players", id));
            fetchPlayers();
        };

        window.openAdminModal = () => document.getElementById('adminModal').classList.remove('hide');
        window.closeAdminModal = () => document.getElementById('adminModal').classList.add('hide');
        window.loginAdmin = () => {
            if(document.getElementById('adminUser').value === 'Shahil' && document.getElementById('adminPass').value === '5964') {
                localStorage.setItem('vpl_admin', 'true'); isAdmin = true;
                document.getElementById('adminPanelBar').classList.remove('hide');
                closeAdminModal(); fetchPlayers();
            } else alert("Invalid");
        };
        window.logoutAdmin = () => { localStorage.removeItem('vpl_admin'); isAdmin = false; window.location.reload(); };

        window.exportSingleCard = async (id) => {
            const p = globalPlayers.find(p => p.id === id);
            if(!p) return;
            
            showLoader("EXPORTING " + p.name);
            await triggerCanvasExport(p, true);
            hideLoader();
        }

        window.downloadAllPptx = async () => {
            if(globalPlayers.length === 0) return;
            showLoader("BUILDING PPTX", "Processing...");
            try {
                const pptx = new PptxGenJS();
                pptx.layout = 'LAYOUT_16x9';

                for (let i = 0; i < globalPlayers.length; i++) {
                    const p = globalPlayers[i];
                    document.getElementById('exportStatusCount').innerText = `Rendering ${i+1} of ${globalPlayers.length}`;
                    const dataUrl = await triggerCanvasExport(p, false);
                    if(dataUrl) {
                        let slide = pptx.addSlide();
                        slide.background = { color: '000000' };
                        slide.addImage({ data: dataUrl, x: 0, y: 0, w: '100%', h: '100%' });
                    }
                }
                await pptx.writeFile({ fileName: 'VPL_2026_All_Player_Cards.pptx' });
            } catch(e) { console.error(e); alert('Error building PPTX'); }
            hideLoader();
        }

        async function triggerCanvasExport(p, triggerDownloadFile) {
            const layout = document.getElementById('layout-pc');
            
            const iconClass = p.role === 'Batsman' ? 'fa-baseball-bat-ball' : p.role === 'Bowler' ? 'fa-crosshairs' : 'fa-star';
            
            document.getElementById('export-img-pc').src = p.photoData;
            document.getElementById('export-name-pc').innerText = p.name;
            document.getElementById('export-role-pc').innerText = p.role;
            
            const iconEl = document.getElementById('export-icon-pc');
            iconEl.className = `fa-solid ${iconClass}`;

            await new Promise(r => setTimeout(r, 600)); 

            const canvas = await html2canvas(layout, { scale: 2, backgroundColor: '#0B0C10', logging: false, useCORS: true });
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);

            if(triggerDownloadFile) {
                const link = document.createElement('a');
                link.download = `VPL2026_${p.name.replace(/\s+/g, '_')}.jpg`;
                link.href = dataUrl;
                link.click();
            }
            return dataUrl;
        }

        function showLoader(title, subtitle = '') {
            document.getElementById('exportLoader').classList.remove('hide');
            document.getElementById('exportStatusTitle').innerText = title;
            document.getElementById('exportStatusCount').innerText = subtitle;
        }
        function hideLoader() { document.getElementById('exportLoader').classList.add('hide'); }

        window.setView('register');
    </script>
</body>
                </html>
